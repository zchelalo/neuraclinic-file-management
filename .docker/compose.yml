name: neuraclinic-file-management

services:
  neuraclinic-file-management:
    container_name: neuraclinic-file-management
    restart: unless-stopped
    env_file: ../.env
    build:
      context: ../
      dockerfile: ./.docker/Dockerfile
    ports:
      - 8004:8000
    volumes:
      - ../:/app-src
      - ../certs:/app/certs:ro
    environment:
      ENVIRONMENT: development
      AUTO_RUN_MIGRATIONS: "true"
    depends_on:
      neuraclinic-file-management-db:
        condition: service_healthy
      neuraclinic-file-management-minio:
        condition: service_healthy
      neuraclinic-file-management-minio-init:
        condition: service_completed_successfully
    networks:
      - neuraclinic-network
      - neuraclinic-file-management-network

  neuraclinic-file-management-db:
    image: postgres:17.6
    container_name: neuraclinic-file-management-db
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_DB: neuraclinic-file-management
      TZ: America/Hermosillo
    volumes:
      - neuraclinic-file-management-db-data:/var/lib/postgresql/data
    ports:
      - 5437:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuraclinic-file-management-network

  neuraclinic-file-management-adminer:
    image: adminer
    container_name: neuraclinic-file-management-adminer
    environment:
      TZ: America/Hermosillo
      ADMINER_DESIGN: "ng9"
    ports:
      - 8087:8080
    depends_on:
      neuraclinic-file-management-db:
        condition: service_started
    networks:
      - neuraclinic-file-management-network

  neuraclinic-file-management-minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: neuraclinic-file-management-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY_ID:-neuraclinic}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_ACCESS_KEY:-neuraclinic-secret}
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - neuraclinic-file-management-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuraclinic-file-management-network

  neuraclinic-file-management-minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: neuraclinic-file-management-minio-init
    depends_on:
      neuraclinic-file-management-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://neuraclinic-file-management-minio:9000 ${STORAGE_ACCESS_KEY_ID:-neuraclinic} ${STORAGE_SECRET_ACCESS_KEY:-neuraclinic-secret};
      mc mb --ignore-existing local/${STORAGE_BUCKET:-neuraclinic-local-files};
      mc anonymous set none local/${STORAGE_BUCKET:-neuraclinic-local-files};
      "
    networks:
      - neuraclinic-file-management-network

networks:
  neuraclinic-network:
    external: true
  neuraclinic-file-management-network:
    driver: bridge

volumes:
  neuraclinic-file-management-db-data:
    name: neuraclinic-file-management-db-data
  neuraclinic-file-management-minio-data:
    name: neuraclinic-file-management-minio-data

